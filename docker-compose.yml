services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: fourriere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fourriere
      POSTGRES_USER: fourriere_user
      POSTGRES_PASSWORD: fourriere_password_2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_FR.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fourriere-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fourriere_user -d fourriere"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgAdmin - Interface web pour PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fourriere-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fourriere.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - fourriere-network
    depends_on:
      - postgres

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fourriere-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fourriere
      DB_USER: fourriere_user
      DB_PASSWORD: fourriere_password_2024
      JWT_SECRET: votre-secret-jwt-super-securise-changez-moi
      CORS_ORIGIN: http://localhost:8080,http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - fourriere-network
    depends_on:
      postgres:
        condition: service_healthy
    command: npm start

  # Frontend PWA (React + Vite)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: fourriere-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fourriere-network
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  fourriere-network:
    driver: bridge
